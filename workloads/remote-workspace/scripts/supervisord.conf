[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:dbus-system]
command=/bin/bash -lc "mkdir -p /run/dbus; rm -f /run/dbus/pid /run/dbus/system_bus_socket; exec dbus-daemon --system --nofork --nopidfile"
user=root
autorestart=true
startsecs=1
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:kasmvnc]
command=/bin/bash -lc "exec /opt/remote-work/start-kasmvnc.sh"
user=worker
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
