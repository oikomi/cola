[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:dbus-system]
command=/bin/bash -lc "mkdir -p /run/dbus; rm -f /run/dbus/pid /run/dbus/system_bus_socket; exec dbus-daemon --system --nofork --nopidfile"
user=root
autorestart=true
startsecs=1
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:kasmvnc]
command=/bin/bash -lc "exec vncserver %(ENV_DISPLAY)s -fg -geometry %(ENV_KASMVNC_GEOMETRY)s -depth %(ENV_KASMVNC_DEPTH)s -xstartup /opt/remote-work/start-ubuntu-session.sh -websocketPort %(ENV_KASMVNC_PORT)s -httpd /usr/share/kasmvnc/www -interface 0.0.0.0 %(ENV_KASMVNC_AUTH_ARGS)s"
user=worker
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
