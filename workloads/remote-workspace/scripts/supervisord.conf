[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:dbus-system]
command=/bin/bash -lc "mkdir -p /run/dbus; rm -f /run/dbus/pid /run/dbus/system_bus_socket; exec dbus-daemon --system --nofork --nopidfile"
user=root
autorestart=true
startsecs=1
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:xvfb]
command=/usr/bin/Xvfb %(ENV_DISPLAY)s -screen 0 %(ENV_RESOLUTION)s -ac +extension GLX +render -noreset
user=worker
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ubuntu-session]
command=/bin/bash -lc "exec /opt/remote-work/start-ubuntu-session.sh"
user=worker
autorestart=true
startsecs=5
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:x11vnc]
command=/bin/bash -lc "if [ \"%(ENV_VNC_DISABLE_PASSWORD)s\" = \"1\" ]; then exec x11vnc -display %(ENV_DISPLAY)s -rfbport %(ENV_VNC_PORT)s -nopw -forever -shared -noxdamage -xrandr resize; else exec x11vnc -display %(ENV_DISPLAY)s -rfbport %(ENV_VNC_PORT)s -rfbauth /home/worker/.vnc/passwd -forever -shared -noxdamage -xrandr resize; fi"
user=worker
autorestart=true
startsecs=5
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:websockify]
command=/bin/bash -lc "websockify --web /opt/novnc %(ENV_NOVNC_PORT)s localhost:%(ENV_VNC_PORT)s"
user=worker
autorestart=true
startsecs=3
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
