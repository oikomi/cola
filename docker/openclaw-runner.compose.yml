services:
  openclaw-runner-01:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-runner-01
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - ${HOME}/.codex:/home/node/.codex:ro
    environment:
      COLA_API_BASE_URL: ${COLA_API_BASE_URL:-http://host.docker.internal:50038}
      COLA_RUNNER_NAME: ${COLA_RUNNER_NAME:-OpenClaw Runner-01}
      COLA_RESOURCE_POOL: ${COLA_RESOURCE_POOL:-docker-core}
      COLA_RUNNER_HOST: ${COLA_RUNNER_HOST:-host.docker.internal}
      COLA_RUNNER_ENGINE: openclaw
      COLA_CODEX_CONFIG_PATH: /home/node/.codex/config.toml
      COLA_CODEX_AUTH_PATH: /home/node/.codex/auth.json
    command:
      [
        "sh",
        "-lc",
        "if command -v node >/dev/null 2>&1; then node /workspace/scripts/openclaw-runner/bootstrap.mjs; elif command -v bun >/dev/null 2>&1; then bun /workspace/scripts/openclaw-runner/bootstrap.mjs; else echo 'Missing node/bun runtime for bootstrap' >&2; sleep infinity; fi",
      ]
