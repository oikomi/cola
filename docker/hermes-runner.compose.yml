services:
  hermes-runner-01:
    image: ${HERMES_AGENT_IMAGE:-ghcr.io/nousresearch/hermes-agent:latest}
    container_name: hermes-runner-01
    restart: unless-stopped
    working_dir: /workspace
    entrypoint: ["sh", "-lc"]
    volumes:
      - ..:/workspace
      - ${HOME}/.codex:/home/node/.codex:ro
    environment:
      COLA_API_BASE_URL: ${COLA_API_BASE_URL:-http://host.docker.internal:3000}
      COLA_RUNNER_NAME: ${COLA_RUNNER_NAME:-Hermes Runner-01}
      COLA_RESOURCE_POOL: ${COLA_RESOURCE_POOL:-docker-core}
      COLA_RUNNER_HOST: ${COLA_RUNNER_HOST:-host.docker.internal}
      HERMES_HOME: /tmp/hermes-home
      HERMES_CODEX_CONFIG_PATH: /home/node/.codex/config.toml
      HERMES_CODEX_AUTH_PATH: /home/node/.codex/auth.json
      HERMES_BIN: /opt/hermes/.venv/bin/hermes
    command:
      [
        "if command -v node >/dev/null 2>&1; then node /workspace/scripts/hermes-runner/bootstrap.mjs; elif command -v bun >/dev/null 2>&1; then bun /workspace/scripts/hermes-runner/bootstrap.mjs; else echo 'Missing node/bun runtime for bootstrap' >&2; sleep infinity; fi",
      ]
